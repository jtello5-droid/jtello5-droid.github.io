<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eix cronològic · Història de la filosofia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a12; --bg2:#0b1020; --panel:#121829; --panel2:#171f33; --glass:#0e1424cc;
    --ink:#eef2fb; --dim:#97a3bd; --faint:#5d6883; --line:#243049; --line2:#2f3d5c;
    --phi:#ffc94d; --pol:#ff6b6b; --rel:#bd93ff; --sci:#2fe0c8; --gold:#ffc94d;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --ease:cubic-bezier(.33,.02,.12,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  #space{position:fixed;inset:0;z-index:0;display:block}
  .nebula{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(80% 60% at 78% -10%, #21407a40, transparent 60%),
               radial-gradient(70% 60% at 5% 110%, #6b3d8a35, transparent 55%),
               radial-gradient(90% 70% at 50% 120%, #1d6d6640, transparent 60%)}

  /* TOPBAR */
  .top{position:fixed;top:0;left:0;right:0;z-index:40;height:58px;display:flex;align-items:center;gap:1.2rem;
    padding:0 1.3rem;background:var(--glass);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .brand{font-family:var(--disp);font-weight:700;font-size:1.02rem;letter-spacing:-.01em;white-space:nowrap;display:flex;align-items:center;gap:.55rem}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .eras{display:flex;gap:.25rem}
  .era{font-family:var(--body);font-size:.78rem;font-weight:600;color:var(--dim);background:transparent;border:1px solid transparent;
    padding:.36rem .7rem;border-radius:9px;cursor:pointer;transition:.25s var(--ease);display:flex;gap:.45rem;align-items:center;white-space:nowrap}
  .era .rn{font-family:var(--disp);font-weight:700;opacity:.55;font-size:.74rem}
  .era:hover{background:#ffffff0d;color:var(--ink)}
  .era.on{background:linear-gradient(180deg,#ffd873,#f0b021);color:#241a00;border-color:#ffd873;box-shadow:0 0 18px -4px var(--gold)}
  .era.soon{opacity:.45;cursor:not-allowed}
  .legend{display:flex;gap:.9rem;margin-left:auto;flex-wrap:wrap}
  .lg{display:flex;align-items:center;gap:.38rem;font-size:.72rem;color:var(--dim);font-weight:500;white-space:nowrap}
  .lg i{width:10px;height:10px;border-radius:50%;display:block}

  /* STAGE */
  .stage{position:fixed;top:58px;left:0;right:0;bottom:0;z-index:5;overflow:auto;cursor:grab}
  .stage.drag{cursor:grabbing}
  .stage::-webkit-scrollbar{height:11px;width:11px}
  .stage::-webkit-scrollbar-thumb{background:var(--line2);border-radius:10px}
  .timeline{position:relative;min-width:max-content}

  .gridc{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,#2a3a5c80 12%,#2a3a5c80 88%,transparent);z-index:1}
  .clabel{position:absolute;transform:translateX(-50%);font-family:var(--disp);font-weight:700;font-size:1.05rem;color:#5d6b8e;letter-spacing:.04em;z-index:1;text-align:center}
  .clabel .sub{display:block;font-family:var(--body);font-weight:600;font-size:.6rem;color:var(--faint);letter-spacing:.14em;margin-top:2px}

  .axis{position:absolute;left:0;right:0;height:3px;border-radius:3px;z-index:2;
    background:linear-gradient(90deg,transparent 0%, #2fe0c855 6%, #ffc94d66 50%, #ff6b6b55 94%, transparent 100%);box-shadow:0 0 22px -4px #ffc94d55}

  .node{position:absolute;transform:translateX(-50%);z-index:5;cursor:pointer}
  .node .conn{position:absolute;left:50%;width:2px;background:currentColor;opacity:.32;transform:translateX(-50%);z-index:-1}
  .chip{position:relative;display:flex;flex-direction:column;gap:2px;min-width:96px;max-width:188px;
    background:var(--panel);border:1px solid var(--line2);border-left:3px solid currentColor;border-radius:11px;
    padding:8px 11px;transition:.22s var(--ease);box-shadow:0 6px 18px -10px #000}
  .node:hover .chip{transform:translateY(-3px) scale(1.03);box-shadow:0 0 0 1px currentColor,0 10px 30px -10px currentColor}
  .chip .yr{font-family:var(--disp);font-weight:700;font-size:.72rem;color:currentColor;letter-spacing:.01em}
  .chip .nm{font-size:.82rem;font-weight:600;color:var(--ink);line-height:1.18}
  .chip .sb{font-size:.68rem;color:var(--faint);line-height:1.15}
  .node.thought .chip{min-width:120px;background:var(--panel2)}
  .node.thought .chip .nm{font-family:var(--disp);font-weight:600;font-size:.92rem}
  .node .orb{position:absolute;left:50%;width:11px;height:11px;border-radius:50%;background:currentColor;
    transform:translateX(-50%);box-shadow:0 0 12px currentColor,0 0 0 4px var(--bg)}

  .scrollhint{position:fixed;right:1.1rem;bottom:.9rem;z-index:8;font-size:.72rem;color:var(--faint);
    background:var(--glass);backdrop-filter:blur(6px);border:1px solid var(--line);padding:.4rem .85rem;border-radius:20px;pointer-events:none}
  .keys{position:fixed;left:1.1rem;bottom:.9rem;z-index:8;font-size:.72rem;color:var(--faint)}
  .keys kbd{font-family:var(--body);border:1px solid var(--line2);border-radius:5px;padding:.02rem .32rem;color:var(--dim);background:#0e1424}

  /* DETAIL */
  .detail{position:fixed;inset:0;z-index:60;display:none;background:#070a12e8;backdrop-filter:blur(8px)}
  .detail.on{display:flex;align-items:center;justify-content:center;padding:clamp(10px,3vh,40px) clamp(10px,3vw,48px)}
  .card3d{width:min(1080px,100%);max-height:92vh;display:grid;grid-template-columns:40% 60%;
    background:linear-gradient(180deg,#101728,#0c1220);border:1px solid var(--line2);border-radius:22px;overflow:hidden;
    box-shadow:0 40px 120px -30px #000,0 0 0 1px #ffffff08;transform:perspective(1600px) rotateX(.6deg)}
  .media{position:relative;overflow:hidden;min-height:260px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 100% at 30% 20%, var(--cc), #0a0f1c 78%)}
  .media .glowill{width:62%;height:62%;filter:drop-shadow(0 0 22px var(--cc))}
  .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .media .badge{position:absolute;top:16px;left:16px;font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:#fff;background:#00000055;border:1px solid #ffffff33;padding:.3rem .7rem;border-radius:30px;backdrop-filter:blur(4px)}
  .panel{display:flex;flex-direction:column;min-height:0;background:var(--panel)}
  .pbody{overflow-y:auto;padding:36px clamp(24px,3.5vw,52px) 18px}
  .pk{font-size:.72rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--cc);margin-bottom:.5rem}
  .detail h2{font-family:var(--disp);font-weight:700;font-size:clamp(1.7rem,3.4vw,2.5rem);line-height:1.04;letter-spacing:-.02em}
  .drole{font-size:1rem;color:var(--dim);margin-top:.3rem;font-weight:500}
  .sec{margin-top:1.5rem}
  .sec h4{font-size:.7rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;display:flex;align-items:center;gap:.55rem}
  .sec h4::before{content:"";width:20px;height:2px;background:var(--gold);border-radius:2px}
  .sec p{font-size:1.02rem;line-height:1.62;color:#cdd6ea}
  .sec p strong{color:#fff;font-weight:600}
  .sec p em{font-style:normal;color:#fff;border-bottom:1.5px solid var(--cc);padding-bottom:1px}
  .nav{display:flex;align-items:center;gap:.6rem;padding:.85rem clamp(24px,3.5vw,52px);border-top:1px solid var(--line);background:#0e1424cc;backdrop-filter:blur(6px)}
  .nav .pos{flex:1;font-size:.76rem;color:var(--dim);font-variant-numeric:tabular-nums}
  .nb{height:38px;padding:0 .95rem;border:1px solid var(--line2);background:var(--panel2);border-radius:9px;color:var(--ink);
    font-family:var(--body);font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:.4rem}
  .nb:hover{border-color:var(--cc);color:var(--cc);box-shadow:0 0 14px -6px var(--cc)}
  .nb:disabled{opacity:.34;cursor:default}
  .closeb{position:absolute;top:14px;right:16px;z-index:5;width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);
    background:#0e1424cc;color:var(--ink);font-size:1.05rem;cursor:pointer;backdrop-filter:blur(6px)}
  .closeb:hover{background:var(--pol);color:#fff;border-color:var(--pol)}

  .toast{position:fixed;left:50%;bottom:1.4rem;transform:translateX(-50%) translateY(20px);z-index:80;opacity:0;
    background:#1a2238;color:var(--ink);border:1px solid var(--line2);padding:.7rem 1.2rem;border-radius:30px;font-size:.85rem;transition:.3s var(--ease);pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* franja de subperíodes (A) */
  .periodband{position:absolute;left:0;height:54px;z-index:3}
  .bandcap{position:absolute;left:10px;font-size:.64rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);z-index:3}
  .pseg{position:absolute;top:0;height:54px;border-radius:11px;border:1px solid;display:flex;flex-direction:column;justify-content:center;
    padding:0 15px;cursor:pointer;overflow:hidden;transition:.2s var(--ease)}
  .pseg:hover{transform:translateY(-2px);filter:brightness(1.3)}
  .pseg .pn{font-family:var(--disp);font-weight:700;font-size:.94rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pseg .pc{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}

  /* botó característiques (B) */
  .charbtn{font-family:var(--body);font-size:.78rem;font-weight:600;color:#241a00;background:linear-gradient(180deg,#ffe08a,#f2c14e);
    border:1px solid #ffe08a;padding:.36rem .8rem;border-radius:9px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:.4rem;white-space:nowrap;box-shadow:0 0 16px -6px var(--gold)}
  .charbtn:hover{filter:brightness(1.06);transform:translateY(-1px)}

  /* modal info (subperíode / característiques) */
  .info{position:fixed;inset:0;z-index:62;display:none;align-items:center;justify-content:center;background:#070a12e0;backdrop-filter:blur(8px);padding:5vh 5vw}
  .info.on{display:flex}
  .infocard{position:relative;max-width:780px;width:100%;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,#101728,#0c1220);
    border:1px solid var(--line2);border-top:4px solid var(--cc,var(--gold));border-radius:20px;padding:38px clamp(24px,4vw,52px);box-shadow:0 40px 120px -30px #000}
  .infocard .pk{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cc,var(--gold))}
  .infocard h2{font-family:var(--disp);font-weight:700;font-size:2rem;letter-spacing:-.02em;margin:.3rem 0 .5rem}
  .infocard .sec{margin-top:1.25rem}
  .infocard .sec h4{font-size:.7rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--cc,var(--gold));margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
  .infocard .sec h4::before{content:"";width:18px;height:2px;background:currentColor}
  .infocard .sec p{font-size:1.02rem;line-height:1.6;color:#cdd6ea}
  .infocard p em{font-style:normal;color:#fff;border-bottom:1.5px solid var(--cc,var(--gold));padding-bottom:1px}
  .infocard p strong{color:#fff;font-weight:600}
  .trait{padding:.85rem 0;border-top:1px solid var(--line)}
  .trait:first-of-type{border-top:none}
  .trait b{font-family:var(--disp);font-size:1.04rem;color:#fff;display:block;margin-bottom:.18rem}
  .trait span{font-size:.98rem;line-height:1.55;color:#bcc6dd}
  .trait span em{font-style:normal;color:#fff}
  .trait span strong{color:#fff;font-weight:600}
  .closeb2{position:absolute;top:14px;right:16px;z-index:5;width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);
    background:#0e1424cc;color:var(--ink);font-size:1.05rem;cursor:pointer}
  .closeb2:hover{background:var(--pol);color:#fff;border-color:var(--pol)}
  @media (max-width:780px){.card3d{grid-template-columns:1fr;grid-template-rows:32% 68%}.legend{display:none}.era span:not(.rn){display:none}}
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="nebula"></div>

<header class="top">
  <div class="brand"><span class="dot"></span><span id="brandtxt">Eix · Filosofia antiga</span></div>
  <nav class="eras" id="eras"></nav>
  <button class="charbtn" id="charbtn">✦ Característiques</button>
  <div class="legend" id="legend"></div>
</header>

<div class="stage" id="stage"><div class="timeline" id="timeline"></div></div>
<div class="scrollhint">Arrossega / roda per recórrer els segles →</div>
<div class="keys"><kbd>←</kbd> <kbd>→</kbd> moure · <kbd>Esc</kbd> tancar</div>

<div class="detail" id="detail">
  <button class="closeb" id="closeb">✕</button>
  <div class="card3d" id="card3d">
    <div class="media" id="media"></div>
    <div class="panel">
      <div class="pbody" id="pbody"></div>
      <div class="nav"><button class="nb" id="prev">← Anterior</button><div class="pos" id="pos"></div><button class="nb" id="next">Següent →</button></div>
    </div>
  </div>
</div>
<div class="info" id="info"><button class="closeb2" id="infoclose">✕</button><div class="infocard" id="infocard"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============ IL·LUSTRACIONS ============ */
function ILL(name,c){
  const s=`stroke="${c}" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"`;
  const f=`fill="${c}"`; const V=`viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg"`;
  const g={
    scroll:`<path ${s} d="M30 18h54a8 8 0 0 1 8 8v40a8 8 0 0 0 8 8H40a8 8 0 0 1-8-8z"/><path ${s} d="M30 18a8 8 0 0 0-8 8 8 8 0 0 0 8 8h8"/><path ${s} d="M44 34h36M44 46h36M44 58h24" stroke-width="2.2"/>`,
    cosmos:`<circle cx="60" cy="42" r="5" ${f}/><circle ${s} cx="60" cy="42" r="14"/><circle ${s} cx="60" cy="42" r="24"/><circle ${s} cx="60" cy="42" r="34"/><circle cx="60" cy="8" r="3" ${f}/><circle cx="94" cy="42" r="3" ${f}/>`,
    atom:`<circle cx="60" cy="42" r="6" ${f}/><ellipse ${s} cx="60" cy="42" rx="40" ry="15"/><ellipse ${s} cx="60" cy="42" rx="40" ry="15" transform="rotate(60 60 42)"/><ellipse ${s} cx="60" cy="42" rx="40" ry="15" transform="rotate(120 60 42)"/>`,
    athens:`<path ${s} d="M18 70h84"/><path ${s} d="M24 70V36m13 34V36m13 34V36m13 34V36m13 34V36m13 34V36"/><path ${s} d="M14 36h92l-46-20z"/><path ${s} d="M18 36h84" stroke-width="2.2"/>`,
    globe:`<circle ${s} cx="56" cy="42" r="30"/><path ${s} d="M26 42h60M56 12v60" stroke-width="2.2"/><ellipse ${s} cx="56" cy="42" rx="14" ry="30"/><path ${s} d="M92 18l16-7-5 16" stroke-width="2.4"/>`,
    cave:`<path ${s} d="M14 72c0-40 12-52 40-52"/><path ${s} d="M14 72h40"/><circle cx="34" cy="48" r="5" ${f}/><path ${s} d="M34 53v14"/><circle ${s} cx="92" cy="30" r="9"/><path ${s} d="M92 14v6m0 20v6m-22-12h6m32 0h6" stroke-width="2.2"/>`,
    arch:`<path ${s} d="M20 72V30a40 40 0 0 1 80 0v42"/><path ${s} d="M34 72V36a26 26 0 0 1 52 0v36"/><path ${s} d="M14 72h92"/>`,
    cross:`<path ${s} d="M60 14v56M40 36h40"/><circle ${s} cx="60" cy="30" r="11"/>`,
    book:`<path ${s} d="M60 24C50 18 30 18 22 22v44c8-4 28-4 38 2 10-6 30-6 38-2V22c-8-4-28-4-38 2z"/><path ${s} d="M60 24v44" stroke-width="2.2"/>`,
    laurel:`<path ${s} d="M60 74C36 70 26 50 30 24"/><path ${s} d="M60 74C84 70 94 50 90 24"/><path ${s} d="M34 34c6 2 10-2 11-8m-7 18c6 2 11-2 12-9m-8 19c6 1 11-3 12-9M86 34c-6 2-10-2-11-8m7 18c-6 2-11-2-12-9m8 19c-6 1-11-3-12-9" stroke-width="2.2"/>`,
    river:`<path ${s} d="M10 30q18-12 36 0t36 0 28 0"/><path ${s} d="M10 46q18-12 36 0t36 0 28 0"/><path ${s} d="M10 62q18-12 36 0t36 0 28 0"/>`,
    cup:`<path ${s} d="M34 30h52l-6 22a20 20 0 0 1-40 0z"/><path ${s} d="M60 74V64M48 74h24" stroke-width="2.6"/><path ${s} d="M34 30c-8 0-12 6-8 12m60-12c8 0 12 6 8 12" stroke-width="2.4"/>`,
    garden:`<path ${s} d="M60 74V40"/><path ${s} d="M60 52c-10 0-18-6-18-16 12 0 18 6 18 16zM60 44c8 0 14-5 14-13-10 0-14 5-14 13z"/><circle ${s} cx="60" cy="26" r="9"/><path ${s} d="M40 74h40" stroke-width="2.6"/>`,
    balance:`<path ${s} d="M60 16v48"/><path ${s} d="M30 28h60"/><path ${s} d="M30 28l-9 18h18zM90 28l-9 18h18z"/><path ${s} d="M44 64h32" stroke-width="2.4"/><circle cx="60" cy="14" r="3" ${f}/>`,
    battle:`<path ${s} d="M60 14l16 8v18c0 16-16 26-16 26s-16-10-16-26V22z"/><path ${s} d="M60 30v26" stroke-width="2.4"/><path ${s} d="M30 18l16 14M90 18L74 32" stroke-width="2.4"/>`,
    coin:`<circle ${s} cx="60" cy="42" r="28"/><circle ${s} cx="60" cy="42" r="20" stroke-width="2"/><path ${s} d="M52 42h16M60 34v16" stroke-width="2.4"/>`,
    helm:`<path ${s} d="M34 50c0-20 12-30 26-30s26 10 26 30"/><path ${s} d="M34 50h52v8a18 18 0 0 1-26 16 18 18 0 0 1-26-16z"/><path ${s} d="M60 20v-8" stroke-width="2.4"/><path ${s} d="M58 12h4l-2 8z" ${f}/>`,
    snake:`<path ${s} d="M60 12v60"/><path ${s} d="M60 24c-12 0-12 10 0 10s12 10 0 10-12 10 0 10"/>`
  };
  return `<svg ${V}>${g[name]||g.laurel}</svg>`;
}
function MONO(name,c){
  const ini=name.replace(/^(El |La |L'|Els |Les )/,'').split(/[ ·]/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="42" r="28" fill="none" stroke="${c}" stroke-width="2.4"/><circle cx="60" cy="42" r="34" fill="none" stroke="${c}" stroke-width="1" opacity=".4"/><text x="60" y="43" fill="${c}" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="26" text-anchor="middle" dominant-baseline="central">${ini}</text></svg>`;
}

/* ============ CATEGORIES ============ */
const CAT={phi:{name:"Pensament",v:"--phi",c:"#ffc94d"},pol:{name:"Política i guerra",v:"--pol",c:"#ff6b6b"},rel:{name:"Religió",v:"--rel",c:"#bd93ff"},sci:{name:"Ciència i tècnica",v:"--sci",c:"#2fe0c8"}};

/* ============ DADES PER ÈPOCA ============ */
const ERA_DATA = {
  antiga: {
    brand: 'Filosofia antiga',
    ymin: -820, ymax: 560, ppy: 6,
    cyStart: -800, cyEnd: 500,
    char: { h: 'La filosofia antiga', c: '#ffc94d', intro: `Trets de fons que comparteixen, en graus diferents, des dels milesis fins al neoplatonisme —i que canviaran amb l'etapa següent.` },
    items: [
// ---- s. VIII–VII aC ----
{y:-800,date:"c. 800 aC",t:"context",cat:"sci",name:"L'alfabet grec",sub:"escriptura fonètica",ill:"scroll",
 lead:"Els grecs adapten l'alfabet dels <strong>fenicis</strong> i hi afegeixen les vocals: una escriptura senzilla i fàcil d'aprendre, no reservada a uns escribes. Per primer cop el saber es pot <strong>fixar, copiar i criticar</strong>.",
 link:"Sense una escriptura accessible no hi ha tradició de debat públic: és una de les condicions que faran possible el pas del mite al <em>logos</em>."},
{y:-750,date:"s. VIII–VII aC",t:"thought",cat:"phi",name:"El pensament mític",sub:"Homer · Hesíode",ill:"scroll",
 lead:"El mite explica el món <strong>narrant-ne l'origen</strong>: quins déus engendren què. Hesíode (<em>Teogonia</em>) fixa un sistema comú de déus antropomorfs. La seva garantia és l'<strong>autoritat</strong> de la tradició i del poeta inspirat, no la demostració.",

{y:-660,date:"c. 700–600 aC",t:"context",cat:"sci",name:"Sabers d'Orient",sub:"Babilònia · Egipte",ill:"cosmos",

 link:"Occident, sol i feble, queda exposat a les invasions que el faran caure."},
{y:410,date:"410 dC",t:"context",cat:"pol",name:"Alaric saqueja Roma",sub:"els visigots",ill:"arch",
 lead:"<strong>Alaric</strong>, rei dels <strong>visigots</strong>, entra a Roma i la saqueja durant tres dies. Feia 800 anys que cap enemic no trepitjava la ciutat: el xoc és <strong>enorme</strong> a tot el món romà.",
 link:"Molts pagans culpen els cristians d'haver abandonat els déus antics. Per respondre, <strong>Agustí</strong> escriurà <em>La ciutat de Déu</em>."},
{y:455,date:"455 dC",t:"context",cat:"pol",name:"Els vàndals saquegen Roma",sub:"el segon cop",
 lead:"Els <strong>vàndals</strong>, un altre poble germànic vingut del nord d'Àfrica, saquegen Roma una segona vegada, encara més a fons.",
 link:"L'autoritat imperial a Occident ja és gairebé fictícia: la caiguda és qüestió de temps."},
{y:476,date:"476 dC",t:"context",cat:"pol",name:"La caiguda de Roma",sub:"Odoacre deposa Ròmul Augústul",ill:"arch",
 lead:"El cabdill germànic <strong>Odoacre</strong> deposa l'últim emperador d'Occident, un nen anomenat <strong>Ròmul Augústul</strong>. És la data convencional de la fi de l'Imperi romà d'Occident.",
 link:"No cau per una sola causa, sinó per la suma de pressió militar, crisi econòmica, inestabilitat i divisió. A Occident només l'<strong>Església</strong> queda dempeus."},
{y:520,date:"480–524 dC",t:"thought",cat:"phi",name:"Boeci",sub:"«l'últim romà»",ill:"scroll",
 lead:"<strong>Boeci</strong> salva la <strong>lògica d'Aristòtil</strong> traduint-la al llatí i, empresonat, escriu <em>La consolació de la filosofia</em>.",
 link:"És el <strong>pont</strong> pel qual la lògica antiga entra al món medieval llatí (l'única part d'Aristòtil coneguda fins al s. XII)."},
{y:529,date:"529 dC",t:"context",cat:"rel",name:"Es tanca l'Acadèmia d'Atenes",sub:"el final del món antic",ill:"book",
 lead:"L'emperador <strong>Justinià</strong> clausura l'<strong>Acadèmia d'Atenes</strong>, l'escola fundada per Plató 900 anys abans. El mateix any, <strong>Benet de Núrsia</strong> funda el monestir de Montecassino.",
 link:"El saber pagà s'apaga just quan el <strong>monestir cristià</strong> comença a custodiar-lo. La filosofia esdevé <em>ancilla theologiae</em>: comença l'Edat Mitjana."}

    traits: [

 ["Temps cíclic i cosmos etern","El món no té un començament absolut ni una fi cap a la qual camini; l'ordre és etern i sovint cíclic."]

    items: [
// ---- Patrística ----
{y:400,date:"354–430 dC",t:"thought",cat:"phi",name:"Agustí d'Hipona",sub:"la gran frontissa",ill:"book",
 lead:"Fon el <strong>neoplatonisme</strong> amb el cristianisme. Gira cap a la <strong>interioritat</strong> («no surtis a fora, torna a tu mateix»), entén el mal com a privació de bé i debat <strong>gràcia i lliure albir</strong>. Lema: «crec per entendre, entenc per creure».",
 link:"Després del saqueig de Roma (410) escriu <em>La ciutat de Déu</em> i dona al cristianisme la seva primera gran arquitectura filosòfica: fixa l'agenda del pensament fins al segle XIII."},
{y:430,date:"s. II–V dC",t:"context",cat:"rel",name:"Els Pares de l'Església",sub:"patrística",ill:"cross",
 lead:"Pensadors cristians (Justí, Orígenes, Ambròs, Jeroni, Agustí) que <strong>defensen i expliquen la fe</strong> amb les eines de la filosofia grega, sobretot el platonisme i el neoplatonisme.",
 link:"Construeixen la <strong>filosofia cristiana</strong>: tradueixen els dogmes a conceptes filosòfics i fixen la relació entre fe i raó."},
{y:529,date:"529 dC",t:"context",cat:"rel",name:"El monaquisme benedictí",sub:"«ora et labora»",ill:"book",
 lead:"<strong>Benet de Núrsia</strong> funda Montecassino i la seva regla. Els monestirs esdevenen illes d'ordre en una Europa en ruïnes, i els monjos <strong>copien i conserven</strong> els manuscrits antics.",
 link:"Sense aquesta tasca silenciosa de còpia, bona part del saber clàssic s'hauria perdut: el monestir és el dipòsit de la cultura."},
{y:600,date:"c. 500–630 dC",t:"context",cat:"sci",name:"La salvaguarda del saber",sub:"Boeci · Isidor de Sevilla",ill:"scroll",
 lead:"<strong>Boeci</strong> tradueix part de la lògica d'Aristòtil al llatí (l'única que es coneixerà fins al s. XII). <strong>Isidor de Sevilla</strong> escriu les <em>Etimologies</em>, una enciclopèdia que resumeix tot el saber antic.",
 link:"Durant segles, Occident pensarà amb aquestes engrunes salvades del naufragi del món antic."},
// ---- Islam ----
{y:622,date:"622 dC",t:"context",cat:"rel",name:"Naixement de l'islam",sub:"Mahoma · l'Hègira",
 lead:"<strong>Mahoma</strong> predica un monoteisme estricte; l'any de l'Hègira (622) obre el calendari musulmà. En pocs decennis l'islam unifica Aràbia.",
 link:"La nova civilització islàmica, urbana i oberta, recollirà i ampliarà el saber grec just quan Occident amb prou feines sobreviu."},
{y:700,date:"632–732 dC",t:"context",cat:"pol",name:"Les conquestes àrabs",sub:"al-Àndalus",ill:"battle",
 lead:"En un segle, els àrabs conquereixen des de Pèrsia fins a Hispània (<strong>711</strong>, al-Àndalus). El 732, Carles Martell els atura a Poitiers.",
 link:"A al-Àndalus (Còrdova, Toledo) conviuen musulmans, jueus i cristians: serà el pont per on el saber grec, en àrab, tornarà a Europa."},
{y:830,date:"c. 750–900 dC",t:"context",cat:"sci",name:"La Casa de la Saviesa",sub:"Bagdad · edat d'or islàmica",ill:"cosmos",
 lead:"Sota els abbàssides, Bagdad tradueix i amplia la ciència grega, persa i índia. <strong>Al-Khwarizmí</strong> funda l'<strong>àlgebra</strong> (c. 820) —d'ell ve «algorisme»— i s'adopta la numeració índia amb el <strong>zero</strong>.",
 link:"Mentre Occident sobreviu amb prou feines, el saber floreix en àrab: és l'època que conserva Aristòtil per a tothom."},
{y:910,date:"870–950 dC",t:"thought",cat:"phi",name:"Al-Farabí",sub:"«el segon mestre»",
 lead:"Anomenat «el segon mestre» (després d'Aristòtil), uneix la <strong>lògica aristotèlica</strong> i el neoplatonisme i dissenya una <strong>ciutat ideal</strong> governada pel savi.",
 link:"Obre la gran filosofia islàmica que comentarà i transmetrà Aristòtil a tot el Mediterrani."},
{y:1010,date:"980–1037 dC",t:"thought",cat:"phi",name:"Avicenna",sub:"Ibn Sina",
 lead:"Sistematitza la filosofia: distingeix <strong>essència i existència</strong> i demostra un <strong>Ésser necessari</strong> (Déu) del qual emana la resta. També és un metge de referència.",
 link:"La seva metafísica entra a Europa amb les traduccions i marcarà Aquino i tota l'escolàstica."},
{y:1090,date:"1058–1111 dC",t:"thought",cat:"phi",name:"Al-Ghazali",sub:"la crítica als filòsofs",
 lead:"A <em>La incoherència dels filòsofs</em> sosté que la raó pura no pot demostrar dogmes com la creació o la immortalitat, i reivindica la fe i l'experiència mística (sufisme).",
 link:"Planteja, segles abans que Occident, el problema dels <strong>límits de la raó</strong> davant la fe."},
{y:1170,date:"1126–1198 dC",t:"thought",cat:"phi",name:"Averroes",sub:"Ibn Rushd · «el Comentador»",
 lead:"El gran <strong>comentarista d'Aristòtil</strong>. Defensa que filosofia i religió diuen la mateixa veritat per vies diferents i que cal cultivar la raó sense por.",
 link:"A Europa el llegeixen tant que en diuen «el Comentador»; en sorgeix l'<strong>averroisme llatí</strong>, que esverarà l'Església."},
{y:1190,date:"1138–1204 dC",t:"thought",cat:"phi",name:"Maimònides",sub:"filosofia jueva",ill:"book",
 lead:"Jueu de Còrdova; a la <em>Guia de perplexos</em> mira de <strong>conciliar Aristòtil amb la Torà</strong> per als creients que dubten, amb molta prudència sobre què podem dir de Déu.",
 link:"Mostra que el problema fe-raó és comú a les tres religions del Llibre; influeix directament Tomàs d'Aquino."},
// ---- Alta edat mitjana cristiana ----
{y:800,date:"800 dC",t:"context",cat:"pol",name:"Carlemany",sub:"Imperi carolingi",ill:"laurel",
 lead:"<strong>Carlemany</strong> és coronat emperador (800) i unifica bona part d'Europa. Impulsa una <strong>renaixença cultural</strong> i crea escoles a abadies i catedrals (decret del 787).",
 link:"D'aquestes escoles («scholae») naixeran, segles després, l'escolàstica i les universitats."},
{y:860,date:"c. 810–877 dC",t:"thought",cat:"phi",name:"Escot Eriúgena",sub:"el neoplatònic carolingi",
 lead:"A la cort carolíngia, l'irlandès Eriúgena reprèn el <strong>neoplatonisme</strong>: a <em>De divisione naturae</em> pensa Déu i el món com a graus d'una mateixa realitat que surt de Déu i hi torna.",
 link:"Pensament audaç i aïllat: una espurna de filosofia en uns segles dominats per la simple conservació."},
{y:1054,date:"1054 dC",t:"context",cat:"rel",name:"El Cisma d'Orient",sub:"catòlics i ortodoxos",ill:"cross",
 lead:"L'Església es trenca en dues: la <strong>catòlica</strong> (Roma, llatina) i l'<strong>ortodoxa</strong> (Constantinoble, grega), per disputes de doctrina i de poder.",
 link:"Occident llatí queda definit com un àmbit cultural propi: és el marc on creixerà l'escolàstica."},
{y:1080,date:"1033–1109 dC",t:"thought",cat:"phi",name:"Anselm de Canterbury",sub:"«pare de l'escolàstica»",
 lead:"Formula l'<strong>argument ontològic</strong>: si Déu és «allò més gran que es pot pensar», ha d'existir, perquè existir és més perfecte que no existir. Lema: <strong>«la fe que busca entendre»</strong>.",
 link:"Inaugura l'esforç escolàstic de <strong>demostrar racionalment</strong> les veritats de la fe."},
{y:1100,date:"1075–1122 dC",t:"context",cat:"pol",name:"La querella de les investidures",sub:"papa contra emperador",
 lead:"Papat i Imperi lluiten per qui nomena els bisbes —és a dir, per <strong>qui mana</strong>. Acaba en taules amb el Concordat de Worms (1122).",
 link:"El gran tema medieval del poder: l'autoritat espiritual i la temporal es disputen el món, i la filosofia política hi reflexiona."},
{y:1095,date:"1095 dC",t:"context",cat:"rel",name:"Les Croades",sub:"Urbà II",ill:"cross",
 lead:"El papa <strong>Urbà II</strong> crida a recuperar Terra Santa; durant dos segles, onades de croats marxen a Orient.",
 link:"Més enllà de la guerra, multipliquen el <strong>contacte amb el món islàmic</strong> i el flux de llibres i idees cap a Europa."},
// ---- Escolàstica: ciència i institucions ----
{y:1020,date:"c. 1020 dC",t:"context",cat:"sci",name:"Alhazen i l'òptica",sub:"Ibn al-Haytham",
 lead:"Al Caire, <strong>Alhazen</strong> escriu el <em>Llibre de l'òptica</em>: demostra amb <strong>experiments</strong> que la llum entra a l'ull (no a l'inrevés, com creien els grecs).",
 link:"El seu mètode experimental, traduït al llatí, és un dels gèrmens de la futura ciència moderna."},
{y:1150,date:"1085–1187 dC",t:"context",cat:"sci",name:"L'Escola de Toledo",sub:"les grans traduccions",ill:"scroll",
 lead:"Reconquerida Toledo (1085), s'hi tradueixen de l'<strong>àrab al llatí</strong> Aristòtil sencer, Ptolemeu (l'<em>Almagest</em>, 1175), Euclides, Avicenna i Averroes.",
 link:"Europa <strong>recupera Aristòtil</strong> i el cosmos geocèntric de Ptolemeu, que es <strong>cristianitzen</strong> i seran la imatge oficial del món fins al s. XVII; és l'espurna que encén l'apogeu escolàstic."},
{y:1190,date:"c. 1088–1200 dC",t:"context",cat:"sci",name:"Neixen les universitats",sub:"Bolonya · París · Oxford",ill:"book",
 lead:"De les escoles catedralícies sorgeixen les <strong>universitats</strong> (Bolonya, París, Oxford): corporacions de mestres i estudiants amb estatuts propis. La filosofia es fa a les «escoles» —d'aquí <strong>escolàstica</strong>.",
 link:"Per primer cop d'ençà d'Alexandria hi ha institucions estables de saber, i la disputa (<em>disputatio</em>) n'és el motor."},
{y:1215,date:"1209 · 1216 dC",t:"context",cat:"rel",name:"Els ordes mendicants",sub:"franciscans i dominicans",
 lead:"Neixen els <strong>franciscans</strong> (1209) i els <strong>dominicans</strong> (1216): ordes de pobresa i predicació que ocupen les càtedres universitàries.",
 link:"Quasi tots els grans escolàstics en surten: dominicans (Albert, Aquino) oberts a Aristòtil; franciscans (Bonaventura, Escot, Occam) més agustinians."},
{y:1202,date:"1202 dC",t:"context",cat:"sci",name:"Fibonacci i les xifres",sub:"Liber Abaci",ill:"coin",
 lead:"<strong>Fibonacci</strong> divulga a Europa les <strong>xifres aràbigues</strong> i el zero amb el <em>Liber Abaci</em>, molt més pràctiques que els nombres romans per al comerç i el càlcul.",
 link:"Una eina mental nova que, amb el temps, farà possible la matematització del món."},
{y:1255,date:"1221–1274 dC",t:"thought",cat:"phi",name:"Bonaventura",sub:"la via franciscana",
 lead:"Franciscà i agustinià: per a ell la raó només arriba a la veritat <strong>il·luminada per la fe</strong>, i tot el saber s'ordena cap a Déu. Desconfia d'un Aristòtil massa autònom.",
 link:"Encarna l'ala que resisteix la confiança total en Aristòtil: el debat intern de l'escolàstica."},
{y:1265,date:"1225–1274 dC",t:"thought",cat:"phi",name:"Tomàs d'Aquino",sub:"la gran síntesi",ill:"cross",
 lead:"A la <em>Summa Theologiae</em> integra <strong>Aristòtil i el cristianisme</strong>: fe i raó són distintes però no es contradiuen (totes dues venen de Déu). Demostra Déu per <strong>cinc vies</strong> i aplica l'hilemorfisme a l'ànima.",
 link:"L'<strong>equilibri</strong> entre fe i raó arriba al cim; el tomisme serà la filosofia oficial del catolicisme."},
{y:1270,date:"c. 1265–1277 dC",t:"context",cat:"rel",name:"L'averroisme i la condemna de 1277",sub:"els límits del pensable",
 lead:"Alguns mestres de París (averroistes, com Siger de Brabant) defensen tesis d'Aristòtil que xoquen amb la fe. El bisbe Tempier <strong>condemna 219 proposicions</strong> (1277).",
 link:"L'Església marca fins on pot arribar la raó: el xoc afebleix la gran síntesi i obre el recel envers Aristòtil."},
// ---- Baixa edat mitjana: crisi ----
{y:1300,date:"1266–1308 dC",t:"thought",cat:"phi",name:"Joan Duns Escot",sub:"«el doctor subtil»",
 lead:"Introdueix distincions fines: la <strong>univocitat de l'ésser</strong> (la paraula «ésser» val igual per a Déu i per a les criatures) i la <strong>primacia de la voluntat</strong> i de la llibertat divina.",
 link:"Comença a separar el que abans estava unit: el terreny i el diví ja no s'expliquen amb el mateix llenguatge."},
{y:1330,date:"1287–1347 dC",t:"thought",cat:"phi",name:"Guillem d'Occam",sub:"nominalisme · la navalla",
 lead:"Nega que els <strong>universals</strong> existeixin: només hi ha individus, i els conceptes són noms (<strong>nominalisme</strong>). La <strong>navalla d'Occam</strong>: no multipliquis els ens sense necessitat.",
 link:"<strong>Separa la fe de la raó</strong>: la teologia no es pot demostrar. Es trenca la síntesi tomista i s'allibera l'estudi de la natura."},
{y:1350,date:"c. 1320–1382 dC",t:"context",cat:"sci",name:"La ciència del moviment",sub:"Buridan · Oresme · Oxford",ill:"atom",
 lead:"A París i Oxford, <strong>Buridan</strong> (teoria de l'<em>ímpetus</em>) i <strong>Oresme</strong> estudien el moviment amb matemàtiques (teorema de la velocitat mitjana) i gosen <strong>discutir Aristòtil</strong>.",
 link:"Comencen a <strong>esquerdar la física d'Aristòtil</strong> des de dins i, sense saber-ho, preparen el terreny de Galileu: la ciència del moviment neix a la baixa edat mitjana."},
{y:1347,date:"1347–1351 dC",t:"context",cat:"pol",name:"La Pesta Negra",sub:"la gran crisi",
 lead:"Una pandèmia mata entre un terç i la meitat d'Europa. Amb les guerres i la fam, ensorra la confiança en l'ordre social i religiós.",
 link:"La catàstrofe afebleix l'autoritat de l'Església i del món medieval: res no tornarà a ser igual."},
{y:1378,date:"1378–1417 dC",t:"context",cat:"rel",name:"El Cisma d'Occident",sub:"dos i tres papes alhora",ill:"cross",
 lead:"L'Església té alhora <strong>dos i fins a tres papes</strong> rivals; l'escàndol dura quaranta anys.",
 link:"L'autoritat espiritual queda profundament desprestigiada: una esquerda per on entraran la Reforma i el món modern."},
{y:1453,date:"1453 dC",t:"context",cat:"pol",name:"Caiguda de Constantinoble",sub:"final de l'Edat Mitjana",ill:"arch",
 lead:"Els <strong>otomans</strong> prenen Constantinoble i s'acaba l'Imperi bizantí. Molts erudits grecs fugen cap a Itàlia <strong>amb els seus llibres</strong>.",
 link:"Aquesta allau de textos grecs originals alimenta l'<strong>Humanisme</strong> i el Renaixement: s'obre una època nova."},
{y:1450,date:"c. 1450 dC",t:"context",cat:"sci",name:"Gutenberg i la impremta",sub:"la revolució del llibre",ill:"book",
 lead:"<strong>Gutenberg</strong> imprimeix amb <strong>tipus mòbils</strong>: els llibres es multipliquen i abarateixen, i el saber deixa de dependre de la còpia manual als monestirs.",
 link:"El control eclesiàstic del coneixement s'esquerda. És, simbòlicament, el <strong>final de l'Edat Mitjana</strong> i el llindar de la modernitat."}
],

 {name:"Patrística",y0:360,y1:640,c:"#cf6b6b",cent:"s. II–VII",

  q:"Com pensar la fe cristiana amb la raó grega?",
  cause:"El cristianisme, ja religió oficial, hereta el llegat grecoromà i l'ha d'assimilar (Agustí)."},
 {name:"Alta edat mitjana",y0:640,y1:1080,c:"#c79a3a",cent:"s. VIII–XI",
  focus:"<strong>Salvar i transmetre</strong> el saber (monestirs, Carolingis) i fer els primers passos del mètode; en paral·lel, esclat de la filosofia <strong>àrab i jueva</strong>.",
  q:"Com conservar i ordenar el saber antic?",
  cause:"Europa rural i fragmentada; el saber es refugia als monestirs mentre l'islam el conrea i l'amplia."},

 {name:"Baixa edat mitjana",y0:1300,y1:1520,c:"#9d7bd8",cent:"s. XIV–XV",

    traits: [

    char: { h: 'La filosofia moderna', c: '#c8a24a', intro: `Trets de fons que comparteixen els pensadors moderns —racionalistes, empiristes i il·lustrats—, fills de la nova ciència i del gir al subjecte.` },
    items: [
// ---- Renaixement i Revolució Científica (s. XV–XVI) ----
{y:1453,date:"1453",t:"context",cat:"pol",name:"Caiguda de Constantinoble",sub:"l'allau de textos grecs",ill:"arch",
 lead:"Els <strong>otomans</strong> prenen Constantinoble (1453) i s'acaba l'Imperi bizantí; molts erudits grecs fugen cap a Itàlia <strong>amb els seus manuscrits</strong> (Plató, els tràgics, els científics).",
 link:"Aquesta allau de textos grecs originals alimenta l'<strong>Humanisme</strong> i empeny el Renaixement: el saber antic torna de primera mà."},
{y:1450,date:"c. 1440–1500",t:"context",cat:"sci",name:"La impremta",sub:"Gutenberg · la difusió del saber",ill:"book",
 lead:"Els <strong>tipus mòbils</strong> multipliquen i abarateixen el llibre: les idees circulen ràpid i fora del control de l'Església i els monestirs.",
 link:"És el motor material de l'Humanisme, la Reforma i la nova ciència. Sense impremta no hi ha modernitat."},
{y:1500,date:"s. XV–XVI",t:"thought",cat:"phi",name:"L'Humanisme",sub:"Petrarca · Erasme · Pico",ill:"scroll",
 lead:"Recuperació dels clàssics («<em>ad fontes</em>», a les fonts), confiança en la <strong>dignitat de l'home</strong> (Pico) i esperit crític i filològic (Erasme).",
 link:"Desplaça l'home cap al centre de la reflexió: és el primer pas del <strong>gir antropocèntric</strong> modern."},
{y:1492,date:"1492",t:"context",cat:"pol",name:"1492: un món nou",sub:"Amèrica · fi de Granada",ill:"globe",
 lead:"Colom arriba a Amèrica; cau Granada (fi de la Reconquesta) i s'expulsen els jueus. S'obre l'era dels <strong>imperis i el comerç global</strong>.",
 link:"Europa descobreix que els antics no ho sabien tot: l'experiència nova obliga a repensar el món i debilita l'autoritat de la tradició."},
{y:1513,date:"1469–1527",t:"thought",cat:"phi",name:"Maquiavel",sub:"el realisme polític",ill:"scroll",
 lead:"A «El Príncep» (1513) separa la <strong>política</strong> de la moral i la religió: estudia el poder tal com és, no com hauria de ser (la <em>virtù</em> i la <em>fortuna</em>).",
 link:"Funda la ciència política moderna i secularitza la política: el primer que pensa l'Estat sense Déu."},
{y:1517,date:"1517",t:"context",cat:"rel",name:"La Reforma protestant",sub:"Luter · les 95 tesis",ill:"cross",
 lead:"Luter proclama la «<strong>sola scriptura</strong>» i el lliure examen: cada creient interpreta la Bíblia sense la mediació de Roma.",
 link:"Trenca la unitat religiosa d'Europa i exalta la <strong>consciència individual</strong>, un dels orígens de l'autonomia moderna del subjecte."},
{y:1543,date:"1543",t:"context",cat:"sci",name:"Copèrnic",sub:"l'heliocentrisme",ill:"cosmos",
 lead:"Contra el geocentrisme de <strong>Ptolemeu i Aristòtil</strong>, «<em>De revolutionibus</em>» (1543) posa el <strong>Sol al centre</strong> i la Terra a girar (heliocentrisme); el mateix any Vesali refunda l'anatomia.",
 link:"Comença la <strong>Revolució Científica</strong> i el «gir copernicà»: la Terra —i l'home— deixen de ser el centre de l'univers."},
{y:1545,date:"1545–1563",t:"context",cat:"rel",name:"El Concili de Trento",sub:"la Contrareforma",ill:"cross",
 lead:"L'Església catòlica respon a la Reforma: reafirma els dogmes i reforça l'<strong>Índex de llibres prohibits</strong>, la Inquisició i els jesuïtes.",
 link:"Europa queda partida en dos blocs; la lliure recerca topa amb un control doctrinal renovat (que aviat patirà Galileu)."},
{y:1580,date:"1533–1592",t:"thought",cat:"phi",name:"Montaigne",sub:"«Què sé jo?»",ill:"book",
 lead:"Als «Assaigs» practica un <strong>escepticisme</strong> humà i tolerant: davant del fanatisme de les guerres de religió, dubta, s'observa a si mateix i suspèn els judicis absoluts.",
 link:"Recupera l'escepticisme antic com a actitud moderna; serà el rival que Descartes voldrà superar."},
{y:1609,date:"1609–1619",t:"context",cat:"sci",name:"Kepler",sub:"les òrbites el·líptiques",ill:"cosmos",
 lead:"A partir de les dades de Tycho Brahe descobreix que els planetes giren en <strong>el·lipses</strong> i formula les lleis del moviment planetari.",
 link:"Converteix l'heliocentrisme en una <strong>física precisa i matemàtica</strong>; obre el camí a Newton."},
{y:1610,date:"1564–1642",t:"context",cat:"sci",name:"Galileu",sub:"la natura, escrita en matemàtiques",ill:"cosmos",
 lead:"Amb el <strong>telescopi</strong> (1610) confirma Copèrnic i, contra <strong>Aristòtil</strong>, mostra que tots els cossos cauen igual: funda la física experimental i matemàtica («el llibre de la natura està escrit en llenguatge matemàtic»).",
 link:"Uneix <strong>experiment i matemàtica</strong> —el mètode de la ciència moderna— i xoca de front amb l'Església."},
{y:1620,date:"1561–1626",t:"thought",cat:"phi",name:"Francis Bacon",sub:"«saber és poder»",ill:"book",
 lead:"Al «<em>Novum Organum</em>» (1620) proposa el <strong>mètode inductiu</strong> (de l'observació a la llei) i denuncia els «ídols» que enganyen la ment.",
 link:"Pare de l'<strong>empirisme</strong> i del projecte tecnocientífic: el coneixement com a instrument de domini i progrés."},
// ---- Racionalisme i empirisme · s. XVII ----
{y:1633,date:"1633",t:"context",cat:"rel",name:"La condemna de Galileu",sub:"ciència contra Església",ill:"cross",
 lead:"La Inquisició obliga Galileu a <strong>abjurar</strong> de l'heliocentrisme i el condemna a arrest domiciliari.",
 link:"Símbol del xoc entre la nova ciència i l'autoritat religiosa; el centre de la ciència es desplaça al nord protestant."},
{y:1637,date:"1596–1650",t:"thought",cat:"phi",name:"Descartes",sub:"«penso, llavors existeixo»",ill:"book",
 lead:"El <strong>pare de la filosofia moderna</strong>. Amb el <strong>dubte metòdic</strong> arriba a una certesa indubtable, el «<em>cogito, ergo sum</em>», i d'aquí reconstrueix tot el saber. Dualisme ment / cos-màquina.",
 link:"Posa el <strong>subjecte que pensa</strong> com a fonament de tot coneixement: el «naixement del jo» i del racionalisme."},
{y:1648,date:"1618–1648",t:"context",cat:"pol",name:"La Pau de Westfàlia",sub:"neix l'Estat modern",ill:"arch",
 lead:"Acaba la <strong>Guerra dels Trenta Anys</strong>, la més devastadora de les guerres de religió. S'imposa el principi de <strong>sobirania</strong>: cada estat decideix la seva religió.",
 link:"Neix el sistema d'estats sobirans i la idea moderna de poder polític laic i territorial."},
{y:1651,date:"1588–1679",t:"thought",cat:"phi",name:"Hobbes",sub:"el «Leviatan»",ill:"balance",
 lead:"En l'estat de naturalesa hi ha «guerra de tots contra tots» («l'home és un llop per a l'home»). Per sobreviure, els individus <strong>pacten</strong> i cedeixen el poder a un sobirà absolut.",
 link:"Primera gran teoria del <strong>contracte social</strong>: el poder ja no ve de Déu, sinó d'un pacte entre individus."},
{y:1660,date:"1660 · 1666",t:"context",cat:"sci",name:"Les acadèmies científiques",sub:"Royal Society · Académie",ill:"atom",
 lead:"Es funden la <strong>Royal Society</strong> de Londres (1660) i l'<strong>Académie des sciences</strong> de París (1666): la ciència s'organitza per experimentar, publicar i comunicar-se.",
 link:"La ciència es torna una empresa <strong>col·lectiva i pública</strong>: el model de la recerca moderna."},
{y:1675,date:"1632–1677",t:"thought",cat:"phi",name:"Spinoza",sub:"«Déu, és a dir, la Natura»",ill:"cosmos",
 lead:"Racionalista radical. A l'«Ètica» defensa que només hi ha <strong>una substància</strong> infinita, Déu o la Natura («<em>Deus sive Natura</em>»): tot és necessari i determinat.",
 link:"Porta el racionalisme al monisme i al determinisme, i obre la <strong>crítica laica de la religió</strong>."},
{y:1689,date:"1632–1704",t:"thought",cat:"phi",name:"Locke",sub:"empirisme i liberalisme",ill:"book",
 lead:"La ment neix com una «<strong>tabula rasa</strong>»: tot el coneixement ve de l'experiència. En política, drets naturals —vida, llibertat, propietat—, govern com a contracte revocable i tolerància.",
 link:"Funda l'<strong>empirisme</strong> i el <strong>liberalisme polític</strong>: la base ideològica de les revolucions anglesa i americana."},
{y:1688,date:"1688–1689",t:"context",cat:"pol",name:"La Revolució Gloriosa",sub:"monarquia parlamentària",ill:"arch",
 lead:"Anglaterra deposa el rei absolutista i imposa al monarca el «<strong>Bill of Rights</strong>» (1689): el poder reial queda limitat pel Parlament i la llei.",
 link:"Primer triomf pràctic del <strong>constitucionalisme</strong>; Locke en serà el teòric i inspirarà tot el liberalisme."},
{y:1700,date:"1646–1716",t:"thought",cat:"phi",name:"Leibniz",sub:"les mònades",ill:"atom",
 lead:"Últim gran racionalista i savi universal (coinventor del <strong>càlcul</strong>). L'univers es compon de «mònades» en «harmonia preestablerta»; com que Déu és perfecte, vivim «al <strong>millor dels mons possibles</strong>».",
 link:"El racionalisme arriba al seu sistema més ambiciós; el seu optimisme serà el blanc de la sàtira de Voltaire."},
// ---- La Il·lustració · s. XVIII ----
{y:1715,date:"1643–1715",t:"context",cat:"pol",name:"Lluís XIV i l'absolutisme",sub:"«L'Estat sóc jo»",ill:"arch",
 lead:"El «<strong>Rei Sol</strong>» encarna la monarquia absoluta de dret diví: tot el poder en el rei, cort a Versalles, centralització.",
 link:"És el model que la Il·lustració i les revolucions voldran enderrocar en nom de la <strong>raó i els drets</strong>."},
{y:1730,date:"s. XVIII",t:"context",cat:"rel",name:"Deisme i secularització",sub:"el Déu «rellotger»",ill:"cross",
 lead:"Molts il·lustrats rebutgen la religió revelada sense ser atees: creuen en un Déu «<strong>rellotger</strong>» que crea l'univers-màquina i el deixa funcionar segons lleis. Tolerància i religió natural.",
 link:"La fe es retira de l'explicació del món, que passa a la ciència: avança la <strong>secularització</strong> moderna."},
{y:1739,date:"1711–1776",t:"thought",cat:"phi",name:"Hume",sub:"l'empirisme radical",ill:"book",
 lead:"Porta l'empirisme cap a l'escepticisme: no podem demostrar la <strong>causalitat</strong> (només successió + hàbit) ni el <strong>jo</strong> (només un feix de percepcions); i no es dedueix el deure del ser.",
 link:"El seu escepticisme «desperta Kant del son dogmàtic» i marca el <strong>límit del coneixement empíric</strong>."},
{y:1748,date:"1689–1755",t:"thought",cat:"phi",name:"Montesquieu",sub:"la divisió de poders",ill:"balance",
 lead:"A «L'esperit de les lleis» (1748) proposa separar els poders —<strong>legislatiu, executiu, judicial</strong>— perquè «el poder freni el poder» i no hi hagi tirania.",
 link:"Dona a les democràcies modernes la seva <strong>arquitectura institucional</strong>; serà a totes les constitucions liberals."},
{y:1750,date:"1694–1778",t:"thought",cat:"phi",name:"Voltaire",sub:"tolerància i raó",ill:"garden",
 lead:"El gran polemista de la Il·lustració: defensa la <strong>llibertat d'expressió</strong> i la tolerància contra el fanatisme i l'Església («<em>Écrasez l'infâme</em>»). Deista.",
 link:"Popularitza l'esperit crític i la lluita per les llibertats civils: encarna la Il·lustració militant."},
{y:1751,date:"1751–1772",t:"context",cat:"sci",name:"L'Encyclopédie",sub:"Diderot · d'Alembert",ill:"book",
 lead:"28 volums que reuneixen <strong>tot el saber humà</strong> —ciència, tècnica, oficis, idees— amb esperit crític i laic. Hi col·laboren els grans il·lustrats.",
 link:"L'arma intel·lectual de la Il·lustració: difondre el coneixement per <strong>emancipar la raó</strong> de la superstició i l'autoritat."},
{y:1762,date:"1712–1778",t:"thought",cat:"phi",name:"Rousseau",sub:"el contracte social",ill:"scroll",
 lead:"«L'home neix lliure i pertot és encadenat». El poder legítim neix de la «<strong>voluntat general</strong>» del poble sobirà; a l'«Emili» repensa l'educació i critica que el progrés hagi corromput l'home.",
 link:"Pare de la <strong>sobirania popular</strong> i inspirador de la Revolució Francesa i del Romanticisme."},
{y:1769,date:"c. 1769–1780",t:"context",cat:"sci",name:"La Revolució Industrial",sub:"la màquina de vapor",ill:"coin",
 lead:"La <strong>màquina de vapor</strong> de Watt (1769) i les fàbriques inicien una transformació econòmica i tècnica sense precedents: producció en massa, ciutats industrials, nova classe obrera.",
 link:"El progrés tècnic somiat per Bacon es fa realitat i canvia el món material; prepara els problemes i les filosofies de l'època contemporània."},
{y:1735,date:"1735 · 1789",t:"context",cat:"sci",name:"Linné i Lavoisier",sub:"ordenar i mesurar la natura",ill:"globe",
 lead:"<strong>Linné</strong> classifica tots els éssers vius amb un sistema universal (1735); <strong>Lavoisier</strong> funda la química moderna amb la balança i la conservació de la massa (~1789).",
 link:"La ciència del s. XVIII <strong>ordena i quantifica</strong> tota la natura, viva i material: el programa de Bacon i Galileu en plena marxa."},
{y:1687,date:"1687",t:"context",cat:"sci",name:"Newton",sub:"la gravitació universal",ill:"atom",
 lead:"Als «<em>Principia</em>» (1687) unifica el cel i la terra amb una sola llei —la <strong>gravitació universal</strong>— i les lleis del moviment. L'univers és un mecanisme matemàtic i previsible.",
 link:"La gran <strong>síntesi</strong> de la Revolució Científica i el model de tota ciència; el seu univers-rellotge domina fins a Einstein."},
{y:1776,date:"1776",t:"context",cat:"pol",name:"La independència dels EUA",sub:"la Declaració d'independència",ill:"scroll",
 lead:"Les colònies americanes es proclamen independents en nom dels <strong>drets naturals</strong> i del govern del poble; la Declaració (1776) i la Constitució apliquen Locke i Montesquieu.",
 link:"Primera gran <strong>revolució liberal</strong>: les idees il·lustrades es fan estat real."},
{y:1776,date:"1723–1790",t:"thought",cat:"phi",name:"Adam Smith",sub:"la «mà invisible»",ill:"coin",
 lead:"A «La riquesa de les nacions» (1776) funda l'economia moderna: si cadascú busca el seu interès en un <strong>mercat lliure</strong>, una «mà invisible» produeix el benefici col·lectiu.",
 link:"Dona la teoria del <strong>liberalisme econòmic</strong>: el vessant econòmic de la Il·lustració."},
{y:1781,date:"1724–1804",t:"thought",cat:"phi",name:"Kant",sub:"el gir copernicà",ill:"book",
 lead:"Corona la filosofia moderna. A la «Crítica de la raó pura» (1781) <strong>sintetitza</strong> racionalisme i empirisme: els objectes s'ajusten a les formes de la ment (el «gir copernicà»); coneixem el <strong>fenomen</strong>, no el noümen. En ètica, l'<strong>imperatiu categòric</strong>.",
 link:"Defineix la Il·lustració —«<em>Sapere aude</em>: atreveix-te a pensar» (1784)— i fixa el límit i la dignitat de la raó autònoma: el cim i el tancament de la modernitat."},
// ---- Les revolucions liberals ----
{y:1789,date:"1789",t:"context",cat:"pol",name:"La Revolució Francesa",sub:"llibertat, igualtat, fraternitat",ill:"battle",
 lead:"El poble enderroca l'Antic Règim; la «<strong>Declaració dels Drets de l'Home i del Ciutadà</strong>» (1789) proclama la llibertat, la igualtat i la sobirania nacional.",
 link:"Les idees de la Il·lustració es fan història i obren l'<strong>època contemporània</strong>; amb el Terror i Napoleó, també els seus dilemes."}
],
    subs: [

    traits: [
 ["Antropocentrisme i gir al subjecte","L'<strong>home</strong> —i en concret el <strong>subjecte que coneix</strong>— passa al centre, en lloc de Déu (medieval) o del cosmos (antic). El punt de partida és el «jo» (el <em>cogito</em> de Descartes)."],
 ["Autonomia de la raó","La raó s'allibera de l'<strong>autoritat</strong> (l'Església, Aristòtil, la tradició): cada individu ha de pensar per si mateix. El lema de Kant: «<em>Sapere aude</em>, atreveix-te a saber». Secularització."],
 ["El problema del coneixement","La pregunta central ja no és «què és l'ésser» sinó «<strong>què i com puc conèixer</strong>» (gnoseologia). D'aquí el gran debat: <strong>racionalisme</strong> (la raó) contra <strong>empirisme</strong> (l'experiència)."],
 ["Mètode i matematització de la natura","Per a un saber segur cal un <strong>mètode</strong> (Descartes, Bacon). La natura s'escriu en llenguatge <strong>matemàtic</strong> (Galileu, Newton) i es coneix mesurant i experimentant."],
 ["Mecanicisme","L'univers —i fins i tot el cos i els animals— és una gran <strong>màquina</strong> regida per lleis, no per finalitats. Déu, si de cas, és el «rellotger» que la posa en marxa (deisme)."],
 ["Confiança en el progrés","La raó i la ciència milloraran la vida humana: neix la idea moderna de <strong>progrés</strong> històric, l'optimisme de la Il·lustració."],

 ["Historicitat","L'home i la veritat ja no es veuen com a eterns sinó com a <strong>històrics</strong>: la moral, la societat i la mateixa raó tenen gènesi i canvien (Hegel, Marx, Darwin)."],
 ["Materialisme i crítica social","El pensament es gira cap a l'economia, la societat i la <strong>praxi</strong>: no només interpretar el món, sinó <strong>transformar-lo</strong> (Marx); neixen les ciències socials (Comte)."],
 ["Existència i sentit","Davant del món desencantat i de les masses, torna la pregunta pel <strong>sentit</strong> de l'existència, la <strong>llibertat</strong> i l'angoixa (Kierkegaard, Nietzsche, existencialisme)."],
 ["El gir lingüístic","Bona part de la filosofia del s. XX se centra en el <strong>llenguatge</strong> com a límit i condició del pensament (Wittgenstein, filosofia analítica, estructuralisme, hermenèutica)."],
 ["Crisi dels fonaments","Cau la certesa: la <strong>física</strong> (relativitat, quàntica) trenca l'univers-rellotge; el saber científic és revisable (Popper, Kuhn) i la <strong>postmodernitat</strong> desconfia dels «grans relats» (Lyotard)."],
 ["Ètica aplicada i drets","Després de les catàstrofes del s. XX (guerres, Shoah, bomba), la filosofia torna a la <strong>pràctica</strong>: drets humans, justícia (Rawls), feminisme, bioètica, ecologia (Nussbaum)."]
]
  }
};

/* ============ ESTAT + REFS ============ */
const stage=document.getElementById('stage');
const timeline=document.getElementById('timeline');
const brandtxt=document.getElementById('brandtxt');
const LANE_H=44, CARD_H=58, GAP_AXIS=46, PAD=150;
let X = y=>y, totalW=0, sorted=[], curEra='antiga';

/* ============ HELPERS ============ */
function roman(n){const m=[["M",1000],["CM",900],["D",500],["CD",400],["C",100],["XC",90],["L",50],["XL",40],["X",10],["IX",9],["V",5],["IV",4],["I",1]];let r="";for(const[s,v]of m){while(n>=v){r+=s;n-=v;}}return r;}
function centuryLabel(y){if(y<0)return "s. "+roman(Math.ceil(Math.abs(y)/100))+" aC";return "s. "+roman(Math.ceil((y+1)/100)||1)+" dC";}
function assignLanes(list){
  const lanes=[]; // last right edge per lane
  list.sort((a,b)=>a.y-b.y);
  list.forEach(it=>{
    const w=Math.min(188,Math.max(100,(it.name.length*7)+34));
    const left=X(it.y)-w/2, right=X(it.y)+w/2;
    let placed=false;
    for(let i=0;i<lanes.length;i++){ if(left> lanes[i]+16){ it.lane=i; lanes[i]=right; placed=true; break; } }
    if(!placed){ it.lane=lanes.length; lanes.push(right); }
  });
  return lanes.length;
}
function hexA(hex,a){const x=hex.replace('#','');return `rgba(${parseInt(x.slice(0,2),16)},${parseInt(x.slice(2,4),16)},${parseInt(x.slice(4,6),16)},${a})`;}

/* ============ CONSTRUCCIÓ DE L'EIX (per època) ============ */
function buildEra(key){
  curEra=key;
  const D=ERA_DATA[key];
  const YMIN=D.ymin, YMAX=D.ymax, PPY=D.ppy;
  totalW=(YMAX-YMIN)*PPY+PAD*2;
  X = y=>(y-YMIN)*PPY+PAD;
  const ITEMS=D.items;
  timeline.innerHTML='';

  const thoughts=ITEMS.filter(i=>i.t==='thought');
  const contexts=ITEMS.filter(i=>i.t==='context');
  const nT=assignLanes(thoughts), nC=assignLanes(contexts);
  const topExtent=GAP_AXIS+nT*LANE_H+CARD_H;
  const botExtent=GAP_AXIS+nC*LANE_H+CARD_H;
  let H=topExtent+botExtent+40;
  const vh=window.innerHeight-58;
  const axisY=Math.max(topExtent+20,(H/2));
  timeline.style.width=totalW+'px';
  timeline.style.height=H+'px';

  // century gridlines + labels
  for(let cy=D.cyStart;cy<=D.cyEnd;cy+=100){
    const g=document.createElement('div');g.className='gridc';g.style.left=X(cy)+'px';timeline.appendChild(g);
    const l=document.createElement('div');l.className='clabel';l.style.left=X(cy+50)+'px';l.style.top='10px';
    const cl=centuryLabel(cy+50), rn=cl.replace('s. ','').replace(/ (aC|dC)$/,'');
    l.innerHTML=rn+'<span class="sub">'+(cy+50<0?'aC':'dC')+'</span>';
    timeline.appendChild(l);
  }
  // axis
  const axis=document.createElement('div');axis.className='axis';axis.style.top=axisY+'px';timeline.appendChild(axis);

  // nodes
  sorted=ITEMS.slice().sort((a,b)=>a.y-b.y);
  ITEMS.forEach(it=>{
    const cat=CAT[it.cat], c=cat.c;
    const isT=it.t==='thought';
    const y = isT ? (axisY-GAP_AXIS-(it.lane*LANE_H)-CARD_H) : (axisY+GAP_AXIS+(it.lane*LANE_H));
    const node=document.createElement('div');
    node.className='node '+(isT?'thought':'context');
    node.style.left=X(it.y)+'px'; node.style.top=y+'px'; node.style.color=c;
    const d = GAP_AXIS + it.lane*LANE_H;
    const connStyle = isT ? `top:${CARD_H}px;height:${d}px` : `top:${-d}px;height:${d}px`;
    const orbTop = isT ? (CARD_H + d - 5) : (-d - 5);
    node.innerHTML=
      `<div class="chip"><span class="yr">${it.date}</span><span class="nm">${it.name}</span>${it.sub?`<span class="sb">${it.sub}</span>`:''}</div>
       <div class="conn" style="${connStyle}"></div>
       <div class="orb" style="top:${orbTop}px"></div>`;
    node.addEventListener('click',e=>{e.stopPropagation();openDetail(sorted.indexOf(it));});
    timeline.appendChild(node);
  });

  // subperíodes band
  const SUBPERIODS=D.subs;
  const periodTop=axisY+botExtent+24;
  const cap=document.createElement('div');cap.className='bandcap';cap.style.top=(periodTop-15)+'px';cap.textContent='Subperíodes';timeline.appendChild(cap);
  const band=document.createElement('div');band.className='periodband';band.style.top=periodTop+'px';band.style.width=totalW+'px';
  SUBPERIODS.forEach(sp=>{
    const seg=document.createElement('div');seg.className='pseg';
    seg.style.left=X(sp.y0)+'px';seg.style.width=(X(sp.y1)-X(sp.y0)-6)+'px';
    seg.style.borderColor=sp.c;seg.style.background=hexA(sp.c,0.16);
    seg.innerHTML=`<span class="pn">${sp.name}</span><span class="pc" style="color:${sp.c}">${sp.cent}</span>`;
    seg.addEventListener('click',ev=>{ev.stopPropagation();openInfo({pk:'Subperíode · '+sp.cent,h:sp.name,c:sp.c,
      html:`<div class="sec"><h4>Focus</h4><p>${sp.focus}</p></div><div class="sec"><h4>Pregunta central</h4><p>${sp.q}</p></div><div class="sec"><h4>Per què passa · el context</h4><p>${sp.cause}</p></div>`});});
    band.appendChild(seg);
  });
  timeline.appendChild(band);
  if(H < periodTop+54+34){ H=periodTop+54+34; timeline.style.height=H+'px'; }

  // recentra
  stage.scrollTop=Math.max(0,axisY-vh/2);
  stage.scrollLeft=0;
}

/* ============ MODAL INFO / CARACTERÍSTIQUES ============ */
const info=document.getElementById('info'),infocard=document.getElementById('infocard');
function openInfo(o){info.style.setProperty('--cc',o.c||'#ffc94d');infocard.innerHTML=`<div class="pk">${o.pk}</div><h2>${o.h}</h2>${o.html}`;info.classList.add('on');}
function closeInfo(){info.classList.remove('on');}
document.getElementById('infoclose').onclick=e=>{e.stopPropagation();closeInfo();};
info.addEventListener('click',e=>{if(e.target===info)closeInfo();});
document.getElementById('charbtn').onclick=e=>{e.stopPropagation();openCharacteristics();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&info.classList.contains('on'))closeInfo();});
function openCharacteristics(){
  const D=ERA_DATA[curEra];
  openInfo({pk:'Característiques comunes',h:D.char.h,c:D.char.c,
    html:`<div class="sec"><p>${D.char.intro}</p></div>`+
         D.traits.map(t=>`<div class="trait"><b>${t[0]}</b><span>${t[1]}</span></div>`).join('')});
}

/* ============ ETAPES + LLEGENDA ============ */
const ERAS=[{n:"Antiga",r:"I",k:"antiga"},{n:"Medieval",r:"II",k:"medieval"},{n:"Moderna",r:"III",k:"moderna"},{n:"Contemporània",r:"IV",k:"contemporania"}];
const erasEl=document.getElementById('eras');
function renderEras(){
  erasEl.innerHTML='';
  ERAS.forEach(e=>{const b=document.createElement('button');b.className='era'+(e.k===curEra?' on':'');
    b.innerHTML=`<span class="rn">${e.r}</span><span>${e.n}</span>`;
    b.onclick=()=>{ if(e.k===curEra){closeDetail();stage.scrollTo({left:0,behavior:'smooth'});} else { switchEra(e.k); } };
    erasEl.appendChild(b);});
}
function switchEra(key){
  closeDetail();
  buildEra(key);
  brandtxt.textContent='Eix · '+ERA_DATA[key].brand;
  renderEras();
}
const legendEl=document.getElementById('legend');
Object.values(CAT).forEach(c=>{const d=document.createElement('div');d.className='lg';d.innerHTML=`<i style="background:${c.c};box-shadow:0 0 8px ${c.c}"></i>${c.name}`;legendEl.appendChild(d);});

/* ============ DETALL ============ */
const detail=document.getElementById('detail'),media=document.getElementById('media'),pbody=document.getElementById('pbody'),
  pos=document.getElementById('pos'),prevB=document.getElementById('prev'),nextB=document.getElementById('next'),card3d=document.getElementById('card3d');
let cur=-1;
function openDetail(i){cur=i;render();detail.classList.add('on');}
function closeDetail(){detail.classList.remove('on');cur=-1;}
function render(){
  const it=sorted[cur], cat=CAT[it.cat], c=cat.c, isT=it.t==='thought';
  card3d.style.setProperty('--cc',c);
  media.style.setProperty('--cc',c);
  media.innerHTML=`<div class="badge" style="color:${c}">${cat.name}</div>`+
    (it.img?`<img src="${it.img}" alt="${it.name}" onerror="this.remove()">`:'')+
    `<div class="glowill">${it.ill?ILL(it.ill,c):MONO(it.name,c)}</div>`;
  pbody.innerHTML=
    `<div class="pk">${cat.name} · ${it.date} · ${centuryLabel(it.y)}</div>
     <h2>${it.name}</h2>${it.sub?`<div class="drole">${it.sub}</div>`:''}
     <div class="sec"><h4>${isT?'El pensament':'Què passa'}</h4><p>${it.lead}</p></div>
     <div class="sec"><h4>${isT?'Context i connexió':'Per què importa per al pensament'}</h4><p>${it.link}</p></div>`;
  pos.textContent=`${cur+1} / ${sorted.length} · ${it.date}`;
  prevB.disabled=cur===0; nextB.disabled=cur===sorted.length-1; pbody.scrollTop=0;
}
prevB.onclick=e=>{e.stopPropagation();if(cur>0){cur--;render();}};
nextB.onclick=e=>{e.stopPropagation();if(cur<sorted.length-1){cur++;render();}};
document.getElementById('closeb').onclick=e=>{e.stopPropagation();closeDetail();};
detail.addEventListener('click',e=>{if(e.target===detail)closeDetail();});

document.addEventListener('keydown',e=>{
  if(detail.classList.contains('on')){
    if(e.key==='ArrowRight'){e.preventDefault();nextB.click();}
    else if(e.key==='ArrowLeft'){e.preventDefault();prevB.click();}
    else if(e.key==='Escape')closeDetail();
  }
});

/* ============ TOAST ============ */
/* ============ TOAST ============ */
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2600);}

/* ============ DRAG + WHEEL ============ */
/* ============ DRAG + WHEEL ============ */
let down=false,sx=0,sl=0;
stage.addEventListener('pointerdown',e=>{if(e.target.closest('.node')||e.target.closest('.pseg'))return;down=true;sx=e.clientX;sl=stage.scrollLeft;stage.classList.add('drag');});
window.addEventListener('pointerup',()=>{down=false;stage.classList.remove('drag');});
window.addEventListener('pointermove',e=>{if(down)stage.scrollLeft=sl-(e.clientX-sx);});
stage.addEventListener('wheel',e=>{if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){stage.scrollLeft+=e.deltaY;e.preventDefault();}},{passive:false});

/* ============ INICI ============ */
renderEras();
buildEra('antiga');

/* ============ FONS 3D ============ */
/* ============ FONS 3D (estrelles) — opcional, degrada amb gràcia ============ */
(function(){
  const s=document.createElement('script');
  s.src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
  s.onload=initSpace; s.onerror=()=>{};
  document.head.appendChild(s);
})();
function initSpace(){
  try{
    if(typeof THREE==='undefined')return;
    const cv=document.getElementById('space');
    const renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    function size(){renderer.setSize(window.innerWidth,window.innerHeight);}
    size();
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,1,2000);
    cam.position.z=600;
    const N=900, pos=new Float32Array(N*3), col=new Float32Array(N*3);
    const palette=[[1,.79,.30],[1,.42,.42],[.74,.58,1],[.18,.88,.78],[.8,.85,1]];
    for(let i=0;i<N;i++){
      pos[i*3]=(Math.random()-.5)*1800; pos[i*3+1]=(Math.random()-.5)*1200; pos[i*3+2]=(Math.random()-.5)*1000;
      const p=palette[(Math.random()*palette.length)|0]; col[i*3]=p[0];col[i*3+1]=p[1];col[i*3+2]=p[2];
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:2.4,vertexColors:true,transparent:true,opacity:.85});
    const pts=new THREE.Points(geo,mat); scene.add(pts);
    let mx=0,my=0;
    window.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5);my=(e.clientY/window.innerHeight-.5);});
    window.addEventListener('resize',()=>{cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();size();});
    (function loop(){requestAnimationFrame(loop);
      pts.rotation.y+=0.0006; pts.rotation.x+=0.0002;
      cam.position.x+=((mx*120)-cam.position.x)*0.03; cam.position.y+=((-my*80)-cam.position.y)*0.03; cam.lookAt(0,0,0);
      renderer.render(scene,cam);})();
  }catch(e){/* fons CSS de reserva */}
}

</script>
